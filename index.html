<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nuvy Photo — CamelionV1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #fff;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  /* ═══ 배경지 선택 화면 ═══ */
  #bg-select-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
    background: #fff;
    z-index: 100;
    transition: opacity 0.4s ease;
  }
  #bg-select-screen.hidden { opacity: 0; pointer-events: none; }

  .select-title {
    color: #333;
    font-size: 14px;
    letter-spacing: 0.4em;
    font-style: italic;
  }

  .bg-grid {
    display: flex;
    gap: 16px;
    padding: 0 20px;
    align-items: center;
    justify-content: center;
  }

  .bg-thumb-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .bg-thumb {
    width: calc((100vw - 140px) / 5);
    max-width: 130px;
    aspect-ratio: 9/16;
    object-fit: cover;
    border: 2.5px solid transparent;
    border-radius: 3px;
    transition: border-color 0.2s, transform 0.2s;
    opacity: 0.7;
    display: block;
  }
  .bg-thumb:hover  { opacity: 1; transform: translateY(-4px); }
  .bg-thumb.active { border-color: #222; opacity: 1; transform: translateY(-4px); }

  .select-btn {
    padding: 14px 56px;
    border: 1.5px solid #222;
    background: transparent;
    color: #222;
    font-family: Georgia, serif;
    font-size: 12px;
    font-style: italic;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .select-btn:hover    { background: #222; color: #fff; }
  .select-btn:disabled { opacity: 0.25; cursor: default; }

  /* ═══ 메인 촬영 화면 (가로) ═══ */
  #main-screen {
    display: none;
    position: fixed; inset: 0;
    flex-direction: row;
    background: #fff;
  }
  #main-screen.show { display: flex; }

  /* 왼쪽 — 카메라 */
  #camera-side {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
  }

  #live-video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #countdown-overlay {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4);
    z-index: 10;
  }
  #countdown-overlay.show { display: flex; }

  #countdown-number {
    font-size: 120px;
    color: #fff;
    font-weight: 700;
    animation: cpulse 1s ease-in-out;
  }
  @keyframes cpulse {
    0%  { transform: scale(1.5); opacity: 0; }
    60% { transform: scale(1.0); opacity: 1; }
    100%{ transform: scale(0.9); opacity: 0.8; }
  }

  /* 대기 중 표시 */
  #waiting-overlay {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3);
    z-index: 9;
  }
  #waiting-overlay.show { display: flex; }
  .waiting-text {
    color: rgba(255,255,255,0.8);
    font-size: 16px;
    letter-spacing: 0.3em;
    font-style: italic;
  }

  #camera-bottom {
    position: absolute;
    bottom: 28px; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 5;
  }

  .shot-label {
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    letter-spacing: 0.3em;
    font-style: italic;
  }

  .shutter-btn {
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.85);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .shutter-btn::after {
    content: '';
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.88);
    transition: all 0.15s;
  }
  .shutter-btn:active::after { width: 42px; height: 42px; }
  .shutter-btn:disabled { opacity: 0.3; cursor: default; }

  /* 오른쪽 — 프리뷰 */
  #preview-side {
    width: 44%;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  #bg-preview-wrap {
    position: relative;
    height: 100%;
    aspect-ratio: 9/16;
    max-width: 100%;
    overflow: hidden;
  }

  #bg-image {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* 필름 프레임 */
  #film-frame {
    position: absolute;
    width: 42%;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: #1a1a1a;
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .film-photos {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 6px 6px 3px;
    background: #1a1a1a;
  }

  .photo-slot {
    width: 100%;
    aspect-ratio: 3.5 / 3;
    background: #2a2a2a;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .photo-slot img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .slot-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.25);
    font-size: 9px;
    letter-spacing: 0.2em;
    font-style: italic;
  }

  .film-footer {
    background: #1a1a1a;
    padding: 5px 0 7px;
    text-align: center;
    flex-shrink: 0;
  }
  .film-footer span {
    color: rgba(255,255,255,0.6);
    font-size: 7px;
    letter-spacing: 0.35em;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 300;
  }

  /* ═══ 결과 화면 (전체화면 모달) ═══ */
  #result-screen {
    display: none;
    position: fixed; inset: 0;
    background: #111;
    z-index: 300;
    flex-direction: row;
    align-items: stretch;
  }
  #result-screen.show { display: flex; }

  /* 결과 — 왼쪽: 합성 이미지 */
  #result-img-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #111;
  }

  #result-img {
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }

  /* 결과 — 오른쪽: QR + 버튼 */
  #result-info {
    width: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px 24px;
    background: #1a1a1a;
    border-left: 1px solid #2a2a2a;
  }

  .result-title {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    letter-spacing: 0.4em;
    font-style: italic;
    text-align: center;
  }

  #result-status {
    color: rgba(255,255,255,0.45);
    font-size: 10px;
    font-style: italic;
    letter-spacing: 0.2em;
  }

  #result-qr {
    padding: 14px;
    background: #fff;
  }

  .result-hint {
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 2;
    font-style: italic;
  }

  .result-btn {
    width: 100%;
    padding: 13px;
    border: 1.5px solid;
    background: transparent;
    font-family: Georgia, serif;
    font-size: 11px;
    font-style: italic;
    letter-spacing: 0.25em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .result-btn.primary   { border-color: #fff; color: #fff; }
  .result-btn.primary:hover  { background: #fff; color: #111; }
  .result-btn.secondary { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.4); font-size: 10px; }
  .result-btn.secondary:hover { border-color: rgba(255,255,255,0.7); color: rgba(255,255,255,0.8); }

  .flash-overlay {
    position: fixed; inset: 0;
    background: white;
    opacity: 0; pointer-events: none;
    z-index: 9999; transition: opacity 0.04s;
  }
  .flash-overlay.flash { opacity: 1; }

  #capture-canvas { display: none; }
</style>
</head>
<body>

<div class="flash-overlay" id="flash"></div>
<canvas id="capture-canvas"></canvas>

<!-- ═══ 배경지 선택 ═══ -->
<div id="bg-select-screen">
  <p class="select-title">— 배경을 선택해주세요 —</p>
  <div class="bg-grid">
    <div class="bg-thumb-wrap" onclick="selectBg(this,'bg1.jpg')">
      <img class="bg-thumb" src="bg1.jpg" alt="bg1">
    </div>
    <div class="bg-thumb-wrap" onclick="selectBg(this,'bg2.jpg')">
      <img class="bg-thumb" src="bg2.jpg" alt="bg2">
    </div>
    <div class="bg-thumb-wrap" onclick="selectBg(this,'bg3.jpg')">
      <img class="bg-thumb" src="bg3.jpg" alt="bg3">
    </div>
    <div class="bg-thumb-wrap" onclick="selectBg(this,'bg4.jpg')">
      <img class="bg-thumb" src="bg4.jpg" alt="bg4">
    </div>
    <div class="bg-thumb-wrap" onclick="selectBg(this,'bg5.jpg')">
      <img class="bg-thumb" src="bg5.jpg" alt="bg5">
    </div>
  </div>
  <button class="select-btn" id="start-btn" onclick="startMain()" disabled>
    촬영 시작 →
  </button>
</div>

<!-- ═══ 메인 촬영 ═══ -->
<div id="main-screen">

  <!-- 왼쪽: 카메라 -->
  <div id="camera-side">
    <video id="live-video" autoplay playsinline muted></video>

    <div id="countdown-overlay">
      <span id="countdown-number">3</span>
    </div>

    <!-- 2컷 사이 대기 중 표시 -->
    <div id="waiting-overlay">
      <p class="waiting-text">잠깐만요...</p>
    </div>

    <div id="camera-bottom">
      <p class="shot-label" id="shot-label">1 / 2 — 눌러서 촬영</p>
      <button class="shutter-btn" id="shutter-btn" onclick="startShot()"></button>
    </div>
  </div>

  <!-- 오른쪽: 프리뷰 -->
  <div id="preview-side">
    <div id="bg-preview-wrap">
      <img id="bg-image" src="" alt="background">
      <div id="film-frame">
        <div class="film-photos">
          <div class="photo-slot" id="slot1">
            <span class="slot-label">1st</span>
          </div>
          <div class="photo-slot" id="slot2">
            <span class="slot-label">2nd</span>
          </div>
        </div>
        <div class="film-footer">
          <span>NUVY PHOTO</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ 결과 화면 ═══ -->
<div id="result-screen">
  <!-- 왼쪽: 합성 이미지 미리보기 -->
  <div id="result-img-wrap">
    <img id="result-img" src="" alt="result">
  </div>

  <!-- 오른쪽: QR + 버튼 -->
  <div id="result-info">
    <p class="result-title">— 우리의 기록 —</p>
    <p id="result-status">현상 중입니다... 🎞️</p>
    <div id="result-qr"></div>
    <p class="result-hint">QR을 스캔하면<br>사진을 저장할 수 있어요 ✿</p>
    <button class="result-btn secondary" onclick="retake()">↩ 다시 찍기</button>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getStorage, ref, uploadBytes, getDownloadURL }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDCNniApykmIrkgpBI4rzhG5JEqvlsjCIc",
  authDomain: "nuvyseason.firebaseapp.com",
  projectId: "nuvyseason",
  storageBucket: "nuvyseason.firebasestorage.app",
  messagingSenderId: "93515457991",
  appId: "1:93515457991:web:6a4c78097a4d201199a5e2"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);
  window._fb = { storage, ref, uploadBytes, getDownloadURL };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
  const video      = document.getElementById('live-video');
  const capCanvas  = document.getElementById('capture-canvas');
  const flashEl    = document.getElementById('flash');
  const shutterBtn = document.getElementById('shutter-btn');
  const shotLabel  = document.getElementById('shot-label');
  const cdOverlay  = document.getElementById('countdown-overlay');
  const cdNumber   = document.getElementById('countdown-number');
  const waitingEl  = document.getElementById('waiting-overlay');

  let stream       = null;
  let selectedBg   = null;
  let shot1DataURL = null;
  let shot2DataURL = null;
  let shotCount    = 0;
  let finalBlob    = null;

  const OUT_W = 1080;
  const OUT_H = 1920;

  const FILM_W   = Math.round(OUT_W * 0.42);
  const FILM_X   = (OUT_W - FILM_W) / 2;
  const PHOTO_W  = FILM_W - 16;
  const PHOTO_H  = Math.round(PHOTO_W * (3 / 3.5));
  const PHOTO_X  = FILM_X + 8;
  const GAP      = Math.round(OUT_W * 0.005);
  const FOOTER_H = Math.round(OUT_W * 0.038);
  const FILM_H   = 8 + PHOTO_H + GAP + PHOTO_H + 8 + FOOTER_H;

  // 카메라
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
    } catch(e) {
      alert('카메라 권한을 허용해주세요');
    }
  }

  // 배경지 선택
  function selectBg(wrap, src) {
    document.querySelectorAll('.bg-thumb').forEach(t => t.classList.remove('active'));
    wrap.querySelector('.bg-thumb').classList.add('active');
    selectedBg = src;
    document.getElementById('start-btn').disabled = false;
  }

  // 촬영 화면으로
  function startMain() {
    document.getElementById('bg-select-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.add('show');
    document.getElementById('bg-image').src = selectedBg;
    startCamera();
  }

  // 1컷 버튼
  function startShot() {
    if (!stream) return;
    shutterBtn.disabled = true;
    runCountdown(() => captureShot());
  }

  // 카운트다운
  function runCountdown(cb) {
    let count = 3;
    cdOverlay.classList.add('show');
    cdNumber.textContent = count;
    cdNumber.style.animation = 'none';
    void cdNumber.offsetWidth;
    cdNumber.style.animation = 'cpulse 1s ease-in-out';
    const iv = setInterval(() => {
      count--;
      if (count > 0) {
        cdNumber.textContent = count;
        cdNumber.style.animation = 'none';
        void cdNumber.offsetWidth;
        cdNumber.style.animation = 'cpulse 1s ease-in-out';
      } else {
        clearInterval(iv);
        cdOverlay.classList.remove('show');
        cb();
      }
    }, 1000);
  }

  // 촬영
  function captureShot() {
    flashEl.classList.add('flash');
    setTimeout(() => flashEl.classList.remove('flash'), 150);

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const targetRatio = 3.5 / 3;
    const currentRatio = vw / vh;
    let sx, sy, sw, sh;
    if (currentRatio > targetRatio) {
      sh = vh; sw = Math.round(vh * targetRatio);
      sx = Math.round((vw - sw) / 2); sy = 0;
    } else {
      sw = vw; sh = Math.round(vw / targetRatio);
      sx = 0; sy = Math.round((vh - sh) / 2);
    }

    capCanvas.width  = PHOTO_W;
    capCanvas.height = PHOTO_H;
    const ctx = capCanvas.getContext('2d');
    ctx.translate(PHOTO_W, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, PHOTO_W, PHOTO_H);

    const dataURL = capCanvas.toDataURL('image/jpeg', 0.95);
    shotCount++;

    if (shotCount === 1) {
      shot1DataURL = dataURL;
      document.getElementById('slot1').innerHTML = `<img src="${dataURL}">`;
      shotLabel.textContent = '잠깐만요...';

      // 2초 대기 후 자동 2컷
      waitingEl.classList.add('show');
      setTimeout(() => {
        waitingEl.classList.remove('show');
        shotLabel.textContent = '2 / 2 — 자동 촬영!';
        runCountdown(() => captureShot());
      }, 2000);

    } else {
      shot2DataURL = dataURL;
      document.getElementById('slot2').innerHTML = `<img src="${dataURL}">`;
      shotLabel.textContent = '완성! ✿';

      // 잠깐 보여주고 결과 화면으로
      setTimeout(() => goResult(), 600);
    }
  }

  // 최종 합성
  async function composeFinal() {
    return new Promise((resolve, reject) => {
      const fc = document.createElement('canvas');
      fc.width = OUT_W; fc.height = OUT_H;
      const ctx = fc.getContext('2d');

      const bgImg = new Image();
      bgImg.crossOrigin = 'anonymous';
      bgImg.onload = () => {
        ctx.drawImage(bgImg, 0, 0, OUT_W, OUT_H);

        const p1 = new Image();
        p1.onload = () => {
          const p2 = new Image();
          p2.onload = () => {
            const filmY = (OUT_H - FILM_H) / 2;

            // 필름 검정 배경
            ctx.fillStyle = '#1a1a1a';
            roundRect(ctx, FILM_X, filmY, FILM_W, FILM_H, 6);
            ctx.fill();

            // 사진 1, 2
            const p1y = filmY + 8;
            ctx.drawImage(p1, PHOTO_X, p1y, PHOTO_W, PHOTO_H);
            const p2y = p1y + PHOTO_H + GAP;
            ctx.drawImage(p2, PHOTO_X, p2y, PHOTO_W, PHOTO_H);

            // NUVY PHOTO
            const footerY = p2y + PHOTO_H + 8;
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(FILM_X, footerY, FILM_W, FOOTER_H);
            ctx.fillStyle = 'rgba(255,255,255,0.62)';
            ctx.font = `${Math.round(FILM_W * 0.07)}px "Helvetica Neue", Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('NUVY PHOTO', OUT_W / 2, footerY + FOOTER_H * 0.68);

            fc.toBlob(b => b ? resolve(b) : reject(new Error('blob 실패')), 'image/jpeg', 0.93);
          };
          p2.src = shot2DataURL;
        };
        p1.src = shot1DataURL;
      };
      bgImg.onerror = () => reject(new Error('배경 로드 실패'));
      bgImg.src = selectedBg;
    });
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  // 결과 화면
  async function goResult() {
    document.getElementById('main-screen').classList.remove('show');
    document.getElementById('result-screen').classList.add('show');

    const statusEl = document.getElementById('result-status');
    const qrEl     = document.getElementById('result-qr');
    statusEl.textContent = '현상 중입니다... 🎞️';

    try {
      finalBlob = await composeFinal();

      // 미리보기 이미지
      const blobURL = URL.createObjectURL(finalBlob);
      document.getElementById('result-img').src = blobURL;

      // Firebase 업로드
      const fb = window._fb;
      if (!fb) throw new Error('Firebase 미설정');
      const sRef = fb.ref(fb.storage, `camelion/${Date.now()}.jpg`);
      await fb.uploadBytes(sRef, finalBlob, { contentType: 'image/jpeg' });
      const url = await fb.getDownloadURL(sRef);
      const qrURL = `https://cameleon-v1.vercel.app/download.html?img=${encodeURIComponent(url)}`;

      statusEl.textContent = 'QR을 스캔해서 저장하세요 ✿';
      
      new QRCode(qrEl, {
        text: qrURL,
        width: 200, height: 200,
        colorDark: '#111',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      statusEl.textContent = '❌ ' + e.message;
      console.error(e);
    }
  }

  // 다시 찍기
  function retake() {
    shotCount = 0;
    shot1DataURL = shot2DataURL = finalBlob = null;
    document.getElementById('result-screen').classList.remove('show');
    document.getElementById('main-screen').classList.remove('show');
    document.getElementById('bg-select-screen').classList.remove('hidden');
    document.querySelectorAll('.bg-thumb').forEach(t => t.classList.remove('active'));
    document.getElementById('start-btn').disabled = true;
    document.getElementById('slot1').innerHTML = '<span class="slot-label">1st</span>';
    document.getElementById('slot2').innerHTML = '<span class="slot-label">2nd</span>';
    document.getElementById('result-img').src = '';
    document.getElementById('result-qr').innerHTML = '';
    document.getElementById('result-status').textContent = '현상 중입니다... 🎞️';
    shotLabel.textContent = '1 / 2 — 눌러서 촬영';
    shutterBtn.disabled = false;
    selectedBg = null;
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  window.selectBg  = selectBg;
  window.startMain = startMain;
  window.startShot = startShot;
  window.retake    = retake;
</script>
</body>
</html>
