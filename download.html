<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvy Photo — CamelionV1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0e0e0e; --cream: #FDFAF4; --muted: #7A7060; --gold: #C8A96E;
  }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    font-family: 'IM Fell English', Georgia, serif;
    overflow-x: hidden; padding-bottom: 60px;
  }

  #loading-wrap {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg); gap: 20px; z-index: 100;
    transition: opacity 0.7s ease;
  }
  #loading-wrap.hidden { opacity: 0; pointer-events: none; }

  .film-strip {
    width: 36px; background: var(--cream);
    border: 1px solid #444;
    display: flex; flex-direction: column;
    gap: 4px; padding: 4px;
    height: 0; overflow: hidden;
    animation: filmroll 2s ease-in-out infinite;
  }
  .film-hole { width: 100%; height: 6px; background: var(--bg); border-radius: 1px; }
  @keyframes filmroll {
    0%   { height: 0; opacity: 0; }
    30%  { opacity: 1; }
    80%  { height: 60px; opacity: 1; }
    100% { height: 60px; opacity: 0; }
  }

  .loading-text {
    color: var(--muted); font-size: 13px;
    letter-spacing: 0.3em; font-style: italic;
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* 디버그 패널 */
  #debug-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.9);
    color: #0f0; font-family: monospace; font-size: 11px;
    padding: 10px; max-height: 200px; overflow-y: auto;
    z-index: 9999; display: none;
  }
  #debug-panel.show { display: block; }

  #photo-slot {
    width: 100%; max-width: 420px;
    overflow: hidden; height: 0;
    transition: height 2.2s cubic-bezier(0.4,0,0.2,1);
  }
  #photo-slot.open { height: var(--target-h, 800px); }
  #photo-img { width: 100%; display: block; }

  #content-wrap {
    width: 100%; max-width: 420px;
    padding: 0 24px;
    display: flex; flex-direction: column;
    align-items: center; gap: 20px;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #content-wrap.visible { opacity: 1; transform: translateY(0); }

  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(to right, transparent, var(--muted), transparent);
    margin-top: 8px;
  }
  .record-text { text-align: center; line-height: 1; }
  .record-label { display: block; color: var(--muted); font-size: 10px; letter-spacing: 0.4em; margin-bottom: 8px; font-style: italic; }
  .record-main  { display: block; color: var(--cream); font-size: 18px; letter-spacing: 0.1em; font-style: italic; }
  .record-date  { display: block; color: var(--gold); font-size: 13px; letter-spacing: 0.25em; margin-top: 6px; }

  .btn-download {
    width: 100%; padding: 16px;
    border: 1.5px solid var(--cream);
    background: transparent; color: var(--cream);
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 12px; font-style: italic;
    letter-spacing: 0.3em; cursor: pointer; transition: all 0.2s;
  }
  .btn-download:hover  { background: var(--cream); color: var(--bg); }
  .btn-download:disabled { opacity: 0.35; cursor: default; }

  .footer { display: flex; flex-direction: column; align-items: center; gap: 8px; padding-top: 4px; }
  .footer-brand { color: var(--muted); font-size: 10px; letter-spacing: 0.35em; font-style: italic; }
  .footer-insta {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--muted); font-size: 9px; font-style: italic;
    letter-spacing: 0.15em; text-decoration: none;
    border-bottom: 1px solid #333; padding-bottom: 2px; transition: color 0.15s;
  }
  .footer-insta:hover { color: var(--gold); }
  .insta-icon { width: 12px; height: 12px; opacity: 0.6; }
</style>
</head>
<body>

<div id="loading-wrap">
  <div class="film-strip">
    <div class="film-hole"></div>
    <div class="film-hole"></div>
    <div class="film-hole"></div>
  </div>
  <p class="loading-text" id="loading-text">현상 중입니다... 🎞️</p>
</div>

<div id="photo-slot">
  <img id="photo-img" src="" alt="우리의 기록">
</div>

<div id="content-wrap">
  <div class="divider"></div>
  <div class="record-text">
    <span class="record-label">our memory</span>
    <span class="record-main">오늘 우리의 기록</span>
    <span class="record-date" id="today-date">—</span>
  </div>
  <button class="btn-download" id="dl-btn" disabled onclick="downloadImg()">↓ 사진 저장하기</button>
  <div class="footer">
    <p class="footer-brand">nuvy photo × camelionV1</p>
    <a class="footer-insta" href="https://www.instagram.com/ggengmin.e/" target="_blank">
      <svg class="insta-icon" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
      made by. @ggengmin.e
    </a>
  </div>
</div>

<!-- 디버그 패널 -->
<div id="debug-panel"></div>

<script>
  // 날짜
  (function() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    document.getElementById('today-date').textContent = `${y}.${m}.${d}`;
  })();

  let imageURL = null;

  // 디버그 로그
  const debugEl = document.getElementById('debug-panel');
  function log(msg) {
    console.log(msg);
    debugEl.classList.add('show');
    debugEl.innerHTML += '<div>' + msg + '</div>';
    debugEl.scrollTop = debugEl.scrollHeight;
  }

  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
  }

  function loadImage() {
    const imgParam = getParam('img');
    log('📌 imgParam 있음: ' + !!imgParam);

    if (!imgParam) {
      document.getElementById('loading-text').textContent = '이미지 정보가 없습니다.';
      log('❌ imgParam 없음');
      return;
    }

    imageURL = decodeURIComponent(imgParam);
    log('📌 URL 앞부분: ' + imageURL.substring(0, 80));

    const img  = document.getElementById('photo-img');
    const slot = document.getElementById('photo-slot');

    img.onload = () => {
      log('✅ 이미지 로드 성공! ' + img.naturalWidth + 'x' + img.naturalHeight);
      const ratio   = img.naturalHeight / img.naturalWidth;
      const targetH = Math.round(window.innerWidth * Math.min(ratio, 2.5));

      setTimeout(() => document.getElementById('loading-wrap').classList.add('hidden'), 700);
      setTimeout(() => {
        slot.style.setProperty('--target-h', targetH + 'px');
        slot.style.height = '0';
        void slot.offsetWidth;
        slot.style.height = targetH + 'px';
      }, 900);
      setTimeout(() => {
        document.getElementById('content-wrap').classList.add('visible');
        document.getElementById('dl-btn').disabled = false;
      }, 3300);
    };

    img.onerror = (e) => {
      log('❌ 이미지 로드 실패! status 확인 필요');
      log('❌ img.src: ' + img.src.substring(0, 100));
      document.getElementById('loading-text').textContent = '이미지를 불러올 수 없습니다.';

      // crossOrigin 없이 재시도
      log('🔄 crossOrigin 없이 재시도...');
      const img2 = document.getElementById('photo-img');
      img2.onerror = () => log('❌ 재시도도 실패');
      img2.onload  = () => {
        log('✅ crossOrigin 없이 성공!');
        img2.onload(null);
      };
      img2.removeAttribute('crossorigin');
      img2.src = imageURL;
    };

    img.src = imageURL;
    log('📌 img.src 설정 완료');
  }

  async function downloadImg() {
    if (!imageURL) return;
    try {
      log('📥 다운로드 시도...');
      const res  = await fetch(imageURL, { mode: 'cors' });
      log('📥 fetch 상태: ' + res.status);
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = `nuvy-camelion-${Date.now()}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
    } catch(e) {
      log('❌ 다운로드 실패: ' + e.message);
      window.open(imageURL, '_blank');
    }
  }

  window.downloadImg = downloadImg;
  window.addEventListener('load', loadImage);
</script>
</body>
</html>
